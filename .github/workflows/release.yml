name: Release

# Mirrors the ai-threat-monitor flow: publishing a GitHub Release (tag vX.Y.Z
# on main) builds and publishes `securevector-guardian-model` to PyPI via
# trusted publishing (OIDC — no long-lived API key in this repo). The project
# name comes from pyproject.toml's `name` field; only the version is stamped
# from the release tag.

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release

    permissions:
      contents: read
      id-token: write  # PyPI trusted publishing

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
      with:
        python-version: "3.10"

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine wheel

    - name: Strip private training surface
      # Runtime only — same rule as the develop preview publish: the training
      # pipeline and eval suites never ship in a public index artifact.
      run: |
        rm -rf src/svguardian/data src/svguardian/eval
        rm -f src/svguardian/model/train.py \
              src/svguardian/model/compare.py \
              src/svguardian/model/infer.py \
              src/svguardian/model/export.py
        echo "Remaining published modules:"
        find src/svguardian -name "*.py" | sort

    - name: Set version from release tag
      run: |
        TAG="${GITHUB_REF_NAME#v}"
        sed -i "s/^version = \".*\"/version = \"$TAG\"/" pyproject.toml
        echo "Publishing securevector-guardian-model==$TAG"

    - name: Security scan before build
      run: |
        if grep -r -i --exclude-dir=.git \
           -E "\b(password|secret|private.*key)\s*[:=]\s*['\"][^'\"]{10,}" src/; then
          echo "Potential secrets found in source code!"
          exit 1
        fi
        # Guard the PRISTINE source tree: no joblib weights, no datasets, and no
        # runtime committed to git. (The runtime IS bundled into the wheel — but
        # by a later, deliberate step that runs after this scan; weights are
        # never in source control, so this tree must be clean here.)
        if find . -name "*.joblib" -o -name "*.runtime.json.gz" -o -name "dataset*.jsonl" | grep -q .; then
          echo "Trained artifacts or datasets present in build tree!"
          exit 1
        fi
        echo "Security scan passed"

    - name: Pre-build validation
      run: |
        PYTHONPATH=src python3 -c "
        from svguardian.model.pure_infer import PureGuardian
        from svguardian.serve import analyze
        from svguardian import cli, server, window, decode
        print('All runtime imports successful (stdlib-only)')
        "

    - name: Bundle model runtime into the wheel
      # Inject the trained runtime (weights) into src/svguardian/_runtime/ so the
      # published wheel is self-contained: `pip install` works offline and
      # `pip install -U` ships new code + new weights together. The source
      # checkout has no models/ (weights are gitignored), so this downloads the
      # runtime from the GitHub release asset. Attach guardian.runtime.json.gz
      # (+ .sha256) to the GitHub Release BEFORE publishing so this build embeds
      # the weights you intend to ship. Deliberately runs AFTER the security
      # scan: that scan guards the pristine source tree against stray artifacts;
      # the wheel carries the runtime on purpose.
      run: PYTHONPATH=src python scripts/bundle_runtime.py

    - name: Build package
      run: python -m build

    - name: Check package
      run: twine check dist/*

    - name: Publish to PyPI (trusted publishing)
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
