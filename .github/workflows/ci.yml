name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install package with train extras
      run: |
        python -m pip install --upgrade pip
        pip install -e .[train] pytest

    - name: Run tests
      # Model-dependent suites (behavior / parity) skip themselves
      # when models/guardian.joblib is absent — the trained artifacts are
      # never in source control, so CI exercises the code paths that don't
      # need weights (and the full suite runs locally where models/ exists).
      run: pytest tests/ -q

    - name: Security scan — no secrets in source
      run: |
        echo "Scanning for potential secrets before any publish..."
        if grep -r -i --exclude-dir=.git \
           -E "\b(password|secret|private.*key)\s*[:=]\s*['\"][^'\"]{10,}" src/; then
          echo "Potential secrets found in source code!"
          exit 1
        fi
        echo "Security scan passed"
